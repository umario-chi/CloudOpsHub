name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ── Code Stage: Secure Source Code (Snyk + SonarQube) ──
  snyk-code-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: theepicbook/package-lock.json
      - run: cd theepicbook && npm ci
      - name: Snyk code and dependency scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=theepicbook/package.json

  sonarqube-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.organization=lakunzy7
            -Dsonar.projectKey=cloudopshub-theepicbook
            -Dsonar.organization=umario-chi
            -Dsonar.sources=theepicbook/
            -Dsonar.exclusions=theepicbook/node_modules/**,theepicbook/public/assets/js/materialize*
      - name: SonarQube quality gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Commit Stage: Prevent Secret Leaks (Gitleaks) ──
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks secret detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Lint & Audit ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: theepicbook/package-lock.json
      - run: cd theepicbook && npm ci
      - run: cd theepicbook && npm run lint
      - name: npm audit
        run: cd theepicbook && npm audit --audit-level=high

  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: theepicbook/Dockerfile
      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: nginx/Dockerfile

  # ── Build Stage: Build, Scan, Push Docker Images ──
  build-and-push:
    needs: [lint, snyk-code-scan, sonarqube-scan, gitleaks, docker-lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # ── Build Backend ──
      - name: Build Backend image
        run: |
          cd theepicbook
          docker build -t $DOCKERHUB_USERNAME/theepicbook-backend:$IMAGE_TAG .
          docker tag $DOCKERHUB_USERNAME/theepicbook-backend:$IMAGE_TAG $DOCKERHUB_USERNAME/theepicbook-backend:latest

      # ── Build Frontend ──
      - name: Build Frontend image
        run: |
          cp -r theepicbook/public nginx/public
          cd nginx
          docker build -t $DOCKERHUB_USERNAME/theepicbook-frontend:$IMAGE_TAG .
          docker tag $DOCKERHUB_USERNAME/theepicbook-frontend:$IMAGE_TAG $DOCKERHUB_USERNAME/theepicbook-frontend:latest

      # ── Build Database ──
      - name: Build Database image
        run: |
          cd theepicbook/db
          docker build -t $DOCKERHUB_USERNAME/theepicbook-database:$IMAGE_TAG .
          docker tag $DOCKERHUB_USERNAME/theepicbook-database:$IMAGE_TAG $DOCKERHUB_USERNAME/theepicbook-database:latest

      # ── Trivy: Scan images ──
      - name: Trivy scan Backend image
        uses: aquasecurity/trivy-action@0.31.0
        continue-on-error: true
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/theepicbook-backend:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      - name: Trivy scan Frontend image
        uses: aquasecurity/trivy-action@0.31.0
        continue-on-error: true
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/theepicbook-frontend:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      - name: Trivy scan Database image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/theepicbook-database:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      # ── Push to Docker Hub ──
      - name: Push Backend image
        run: |
          docker push $DOCKERHUB_USERNAME/theepicbook-backend:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/theepicbook-backend:latest

      - name: Push Frontend image
        run: |
          docker push $DOCKERHUB_USERNAME/theepicbook-frontend:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/theepicbook-frontend:latest

      - name: Push Database image
        run: |
          docker push $DOCKERHUB_USERNAME/theepicbook-database:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/theepicbook-database:latest
#test