name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}
  ENVIRONMENT: production

jobs:

  # ── Code Stage: Secure Source Code (Snyk + SonarQube) ──
  snyk-code-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm
          cache-dependency-path: theepicbook/package-lock.json
      - run: cd theepicbook && npm ci
      - name: Snyk code and dependency scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=theepicbook/package.json

  sonarqube-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=cloudopshub-theepicbook
            -Dsonar.sources=theepicbook/
            -Dsonar.exclusions=theepicbook/node_modules/**,theepicbook/public/assets/js/materialize*
      - name: SonarQube quality gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Commit Stage: Prevent Secret Leaks (Gitleaks) ──
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks secret detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Lint & Audit ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm
          cache-dependency-path: theepicbook/package-lock.json
      - run: cd theepicbook && npm ci
      - run: cd theepicbook && npm run lint

  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: theepicbook/Dockerfile
      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: nginx/Dockerfile

  # ── Build Stage: Build, Scan, Push Docker Images (Trivy) ──
  build-and-push:
    needs: [lint, snyk-code-scan, sonarqube-scan, gitleaks, docker-lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build Backend (Service 2: Node.js API + SSR) ──
      - name: Build Backend image
        run: |
          cd theepicbook
          docker build -t $ECR_REGISTRY/theepicbook-backend-$ENVIRONMENT:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/theepicbook-backend-$ENVIRONMENT:$IMAGE_TAG $ECR_REGISTRY/theepicbook-backend-$ENVIRONMENT:latest

      # ── Build Frontend (Service 1: Nginx + static assets) ──
      - name: Build Frontend image
        run: |
          cp -r theepicbook/public nginx/public
          cd nginx
          docker build -t $ECR_REGISTRY/theepicbook-frontend-$ENVIRONMENT:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/theepicbook-frontend-$ENVIRONMENT:$IMAGE_TAG $ECR_REGISTRY/theepicbook-frontend-$ENVIRONMENT:latest

      # ── Trivy: Scan both images for vulnerabilities ──
      - name: Trivy scan Backend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/theepicbook-backend-${{ env.ENVIRONMENT }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Trivy scan Frontend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/theepicbook-frontend-${{ env.ENVIRONMENT }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      # ── Push to ECR (Service 3: Database is Cloud SQL, no image needed) ──
      - name: Push Backend image to ECR
        run: |
          docker push $ECR_REGISTRY/theepicbook-backend-$ENVIRONMENT:$IMAGE_TAG
          docker push $ECR_REGISTRY/theepicbook-backend-$ENVIRONMENT:latest

      - name: Push Frontend image to ECR
        run: |
          docker push $ECR_REGISTRY/theepicbook-frontend-$ENVIRONMENT:$IMAGE_TAG
          docker push $ECR_REGISTRY/theepicbook-frontend-$ENVIRONMENT:latest
