version: "3.8"

# ── Production deployment (Dockerized MySQL + Monitoring) ──
# 1. Frontend    (nginx)        — static assets + reverse proxy
# 2. Backend     (node)         — Express API + Handlebars SSR
# 3. Database    (mysql)        — Dockerized MySQL with seed data
# 4. Prometheus                 — metrics collection
# 5. Grafana                    — dashboards + visualization
# 6. Node Exporter              — host metrics
# 7. Alertmanager               — alert routing

services:

  frontend:
    image: us-central1-docker.pkg.dev/expadox-lab/cloudopshub-docker/theepicbook-frontend:037384c9c719b6616e18abce56e7114adbb09131
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    image: us-central1-docker.pkg.dev/expadox-lab/cloudopshub-docker/theepicbook-backend:037384c9c719b6616e18abce56e7114adbb09131
    restart: unless-stopped
    environment:
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app-network

  database:
    image: us-central1-docker.pkg.dev/expadox-lab/cloudopshub-docker/theepicbook-database:037384c9c719b6616e18abce56e7114adbb09131
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: bookstore
      MYSQL_USER: appuser
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # TODO: Re-enable monitoring stack after Docker Hub rate limit resets
  # prometheus, grafana, node-exporter, alertmanager

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
